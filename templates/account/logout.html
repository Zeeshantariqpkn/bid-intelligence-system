{% extends 'base.html' %}

{% block title %}Logout - BidIntelligence{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0" data-aos="fade-up">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <div class="bg-warning-light rounded-circle d-inline-flex p-3" style="background: #FFF3E0;">
                            <i class="fas fa-sign-out-alt fa-3x text-warning"></i>
                        </div>
                    </div>
                    <h3 class="fw-bold mb-3">Logout Confirmation</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to logout from BidIntelligence?
                    </p>
                    
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        <div class="d-flex gap-3">
                            <a href="{% url 'projects:dashboard' %}" class="btn btn-outline-secondary flex-grow-1">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-danger flex-grow-1">
                                <i class="fas fa-sign-out-alt me-2"></i>Logout
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
