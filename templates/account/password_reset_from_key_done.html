{% extends 'base.html' %}

{% block title %}Password Reset Complete - BidIntelligence{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0" data-aos="fade-up">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <div class="bg-success-light rounded-circle d-inline-flex p-3" style="background: #E8F8F5;">
                            <i class="fas fa-check-circle fa-3x text-success"></i>
                        </div>
                    </div>
                    <h3 class="fw-bold mb-3">Password Reset Complete!</h3>
                    <p class="text-muted mb-4">
                        Your password has been successfully reset. You can now log in with your new password.
                    </p>
                    <a href="{% url 'account_login' %}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt me-2"></i>Login to Account
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
