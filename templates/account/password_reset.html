{% extends 'base.html' %}

{% block title %}Reset Password - BidIntelligence{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0" data-aos="fade-up">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="fas fa-key fa-3x" style="color: var(--primary);"></i>
                        </div>
                        <h2 class="fw-bold mb-2">Reset Password</h2>
                        <p class="text-muted">Enter your email to receive reset instructions</p>
                    </div>
                    
                    <form method="post" action="{% url 'account_reset_password' %}">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            Please enter a valid email address.
                        </div>
                        {% endif %}
                        
                        <div class="mb-4">
                            <label for="id_email" class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="fas fa-envelope text-muted"></i>
                                </span>
                                <input type="email" name="email" class="form-control border-start-0" 
                                       id="id_email" placeholder="hello@company.com" required autofocus>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                            <i class="fas fa-paper-plane me-2"></i>Send Reset Instructions
                        </button>
                        
                        <div class="text-center">
                            <a href="{% url 'account_login' %}" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i>Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
